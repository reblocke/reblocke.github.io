groups:
  - key: "research-code"
    title: "Reproducible Research Code"
  - key: "teaching-methods"
    title: "Teaching and Methods Resources"
  - key: "project-artifacts"
    title: "Project Artifacts"

materials:
  - title: "Hypercapnic Respiratory Failure Case Definitions"
    category: "research-code"
    type: "reproducible analysis"
    language: "Stata"
    repository_url: "https://github.com/reblocke/Hypercap-Case-Definitions"
    related_publication: "The Consistency of Hypercapnic Respiratory Failure Case Definitions in Electronic Health Record Data"
    description: "Analysis code supporting EHR case-definition comparisons for hypercapnic respiratory failure."
  - title: "Transcutaneous CO2 Accuracy"
    category: "research-code"
    type: "reproducible analysis"
    language: "Python"
    repository_url: "https://github.com/reblocke/tcco2-accuracy"
    related_publication: "Transcutaneous CO2 sensor performance work"
    description: "Code for simulation and analysis of transcutaneous CO2 sensor performance."
  - title: "Hypercapnia Trial Adverse Events"
    category: "research-code"
    type: "reproducible analysis"
    language: "Jupyter Notebook"
    repository_url: "https://github.com/reblocke/Hypercap-Trial-Adverse-Events"
    related_publication: "Hypercapnic respiratory failure adverse-event reporting abstract"
    description: "Notebook-based analysis of hypercapnia reporting as an adverse event in clinical trials."
  - title: "Hickam's Dictum"
    category: "research-code"
    type: "reproducible analysis"
    language: "Stata"
    repository_url: "https://github.com/reblocke/hickams-dictum"
    related_publication: "Hickam's Dictum: An Analysis of Multiple Diagnoses"
    description: "Code and data needed to reproduce the main analyses and figures for the multiple-diagnosis analysis."
  - title: "Weight Loss and OSA Meta-analysis"
    category: "research-code"
    type: "reproducible analysis"
    language: "Stata"
    repository_url: "https://github.com/reblocke/AOM-and-Bari-Surg-for-OSA-SRMA"
    related_publication: "The association of weight loss from anti-obesity medications or bariatric surgery and apnea-hypopnea index in obstructive sleep apnea"
    description: "Supporting code and extraction tables for the systematic review, meta-analysis, and meta-regression."
  - title: "Immersive Virtual Reality in the ICU"
    category: "research-code"
    type: "reproducible analysis"
    language: "Stata"
    repository_url: "https://github.com/reblocke/vr_icu"
    related_publication: "Immersive Virtual Reality Use in Medical Intensive Care"
    description: "Code and materials for the mixed-methods ICU virtual-reality feasibility study."
  - title: "Diagnostic Reasoning Notebooks"
    category: "teaching-methods"
    type: "teaching"
    language: "Jupyter Notebook"
    repository_url: "https://github.com/reblocke/notebooks_dx_reasoning"
