name: "Brian W Locke, MD MSCI"
primary_title: "Assistant Professor of Research, Department of Pulmonary and Critical Care Medicine, Intermountain Medical Center"
clinical_context: "Shock Trauma ICU and Schmidt Chest Clinic"
summary: "I am a pulmonary and critical care physician and clinical investigator focused on respiratory failure, diagnostic reasoning, and research informatics. My work emphasizes open, reproducible tools and practical clinical questions that improve care for patients with chronic and acute respiratory failure."
focus_intro: "Current research and teaching interests include:"
focus_areas:
  - "Hypercapnic respiratory failure and follow-up after hospitalization"
  - "Research informatics and reproducible clinical research workflows"
  - "Diagnostic reasoning and clinical decision-making"
  - "Pulmonary vascular imaging and outcomes"
  - "Medical education materials for trainees and clinicians"
