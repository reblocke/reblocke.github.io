name: "Brian W Locke, MD MSCI"
primary_title: "Assistant Professor of Research, Department of Pulmonary and Critical Care Medicine, Intermountain Medical Center"
clinical_context: "Shock Trauma ICU and Schmidt Chest Clinic"
summary: "I am a pulmonary and critical care physician-scientist focused on respiratory failure, diagnostic evidence, clinical prediction, and reproducible research informatics. My work connects respiratory measurement, Bayesian and statistical reasoning, and open clinical research workflows to practical questions in pulmonary and critical care medicine."
focus_intro: "Current research and teaching interests include:"
focus_areas:
  - "Respiratory measurement, hypercapnia, and follow-up after hospitalization"
  - "Diagnostic evidence, likelihood ratios, and clinical reasoning"
  - "Clinical prediction, EHR/NLP, and research informatics"
  - "Pulmonary vascular imaging and outcomes"
  - "Medical education around evidence-based reasoning"
approach_intro: "My academic work emphasizes methods that make clinical evidence more interpretable, reusable, and useful at the bedside:"
approach_areas:
  - title: "Respiratory Measurement"
    summary: "Using blood gas, bicarbonate, transcutaneous CO2, imaging, and EHR-derived signals to study acute and chronic respiratory failure."
  - title: "Diagnostic Evidence"
    summary: "Applying likelihood ratios, Bayesian reasoning, and information-theoretic framing to clinical reasoning and diagnostic uncertainty."
  - title: "Clinical Prediction and Informatics"
    summary: "Building EHR, NLP, and clinical AI workflows that support transparent prediction, phenotyping, and cohort construction."
  - title: "Reproducible Statistical Workflows"
    summary: "Developing open Stata, Python, and R pipelines for clinical research, including causal inference, prediction modeling, and clear visualization."
  - title: "Medical Education"
    summary: "Teaching evidence-based medicine, statistics, respiratory physiology, and diagnostic reasoning for trainees and clinicians."
